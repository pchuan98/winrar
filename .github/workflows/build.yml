name: release-from-cargo-version

on:
  push:
    branches:
      - main
      - master
    paths:
      - Cargo.toml
      - .github/workflows/build.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: windows-x64-release
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Read package version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content "Cargo.toml" -Raw
          if ($content -match 'version\s*=\s*"([^"]+)"') {
            $version = $matches[1]
            "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "asset=winrarkey-v$version-windows-x64.exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            throw "Failed to read version from Cargo.toml"
          }

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare release asset
        shell: pwsh
        run: |
          $assetName = "${{ steps.version.outputs.asset }}"
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          Copy-Item "target/release/winrarkey.exe" "dist/$assetName" -Force

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $title = "Release $tag"

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --target "${{ github.sha }}" `
              --title $title `
              --notes "Automated release for $tag"
          }

      - name: Upload release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $asset = "dist/${{ steps.version.outputs.asset }}"

          gh release upload $tag $asset --clobber
